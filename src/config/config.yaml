# Data processing
raw_test_images_path: "data/dataset/raw/test/images" # "data/testing/raw/images"
raw_test_labels_path: "data/dataset/raw/test/labels" # "data/testing/raw/labels"
raw_train_images_path: "data/dataset/raw/train/images"
raw_train_labels_path: "data/dataset/raw/train/labels"
processed_test_images_path: "data/dataset/processed/test/images" # "data/testing/processed/images"
processed_test_labels_path: "data/dataset/processed/test/labels" # "data/testing/processed/labels"
processed_train_images_path: "data/dataset/processed/train/images"
